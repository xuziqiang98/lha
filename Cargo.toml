[workspace]
members = [
    "src/core/agent-core",
    "src/core/agent-runtime",
    "src/shared/ansi-escape",
    "src/shared/async-utils",
    "src/integrations/app-server",
    "src/integrations/app-server-protocol",
    "src/resources/apply-patch",
    "src/shared/arg0",
    "src/agent/feedback",
    "src/resources/codex-backend-openapi-models",
    "src/agent/cli",
    "src/shared/common",
    "src/agent/runtime",
    "src/agent/identity",
    "src/platform/exec",
    "src/llm/types",
    "src/llm/runtime",
    "src/platform/sandbox/execpolicy",
    "src/resources/keyring-store",
    "src/resources/file-search",
    "src/platform/sandbox/linux",
    "src/integrations/mcp-server",
    "src/integrations/mcp-types",
    "src/platform/sandbox/process-hardening",
    "src/core/protocol",
    "src/integrations/rmcp-client",
    "src/integrations/responses-api-proxy",
    "src/platform/ipc/stdio-to-uds",
    "src/shared/otel",
    "src/tui/app",
    "src/shared/utils/absolute-path",
    "src/shared/utils/cargo-bin",
    "src/shared/utils/git",
    "src/shared/utils/cache",
    "src/shared/utils/image",
    "src/shared/utils/json-to-toml",
    "src/shared/utils/home-dir",
    "src/shared/utils/pty",
    "src/shared/utils/readiness",
    "src/shared/utils/sleep-inhibitor",
    "src/shared/utils/string",
    "src/llm/api/codex-client",
    "src/llm/api/codex-api",
    "src/core/state",
    "src/platform/sandbox/windows",
]
resolver = "2"

[workspace.package]
version = "0.95.0-alpha.1"
edition = "2024"
license = "Apache-2.0"

[workspace.dependencies]
# Internal
app_test_support = { path = "src/integrations/app-server/tests/common" }
adam-ansi-escape = { path = "src/shared/ansi-escape" }
adam-api = { path = "src/llm/api/codex-api" }
adam-app-server = { path = "src/integrations/app-server" }
adam-app-server-protocol = { path = "src/integrations/app-server-protocol" }
adam-apply-patch = { path = "src/resources/apply-patch" }
adam-arg0 = { path = "src/shared/arg0" }
adam-async-utils = { path = "src/shared/async-utils" }
adam-cli = { path = "src/agent/cli" }
adam-client = { path = "src/llm/api/codex-client" }
adam-common = { path = "src/shared/common" }
adam-agent = { path = "src/agent/runtime" }
adam-agent-core = { path = "src/core/agent-core" }
adam-agent-runtime = { path = "src/core/agent-runtime" }
adam-exec = { path = "src/platform/exec" }
adam-execpolicy = { path = "src/platform/sandbox/execpolicy" }
adam-feedback = { path = "src/agent/feedback" }
adam-identity = { path = "src/agent/identity" }
adam-file-search = { path = "src/resources/file-search" }
adam-git = { path = "src/shared/utils/git" }
adam-keyring-store = { path = "src/resources/keyring-store" }
adam-llm = { path = "src/llm/runtime" }
adam-linux-sandbox = { path = "src/platform/sandbox/linux" }
adam-llm-types = { path = "src/llm/types" }
adam-mcp-server = { path = "src/integrations/mcp-server" }
adam-otel = { path = "src/shared/otel" }
adam-process-hardening = { path = "src/platform/sandbox/process-hardening" }
adam-protocol = { path = "src/core/protocol" }
adam-responses-api-proxy = { path = "src/integrations/responses-api-proxy" }
adam-rmcp-client = { path = "src/integrations/rmcp-client" }
adam-state = { path = "src/core/state" }
adam-stdio-to-uds = { path = "src/platform/ipc/stdio-to-uds" }
adam-tui = { path = "src/tui/app" }
adam-utils-absolute-path = { path = "src/shared/utils/absolute-path" }
adam-utils-cache = { path = "src/shared/utils/cache" }
adam-utils-cargo-bin = { path = "src/shared/utils/cargo-bin" }
adam-utils-image = { path = "src/shared/utils/image" }
adam-utils-json-to-toml = { path = "src/shared/utils/json-to-toml" }
adam-utils-home-dir = { path = "src/shared/utils/home-dir" }
adam-utils-pty = { path = "src/shared/utils/pty" }
adam-utils-readiness = { path = "src/shared/utils/readiness" }
adam-utils-sleep-inhibitor = { path = "src/shared/utils/sleep-inhibitor" }
adam-utils-string = { path = "src/shared/utils/string" }
adam-windows-sandbox = { path = "src/platform/sandbox/windows" }
core_test_support = { path = "src/agent/runtime/tests/common" }
mcp-types = { path = "src/integrations/mcp-types" }
mcp_test_support = { path = "src/integrations/mcp-server/tests/common" }

# External
allocative = "0.3.3"
ansi-to-tui = "7.0.0"
